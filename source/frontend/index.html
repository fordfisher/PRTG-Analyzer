<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PyPRTG_CLA</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <link rel="stylesheet" href="/static/css/styles.css" />
  <script src="/static/vendor/echarts.min.js"></script>
</head>
<body>
  <div id="particle-bg"></div>
  <div id="update-overlay" class="update-overlay" hidden aria-live="polite">
    <div class="update-overlay-backdrop"></div>
    <div class="update-overlay-card">
      <div class="update-overlay-title" id="update-overlay-title">Update available</div>
      <div class="update-overlay-message" id="update-overlay-message"></div>
      <div class="update-overlay-actions" id="update-overlay-actions">
        <button type="button" id="update-overlay-btn" class="update-overlay-btn">Update now</button>
        <button type="button" id="update-overlay-dismiss" class="update-overlay-dismiss">Later</button>
      </div>
    </div>
  </div>
  <div class="app-shell">
    <header class="app-header">
      <div class="logo">PyPRTG_CLA</div>
      <span id="app-version" class="app-version" aria-label="Application version"></span>
      <div class="subtitle">Just another tool.</div>
      <div class="header-spacer"></div>
      <span id="update-status" class="update-status" aria-live="polite"></span>
      <button type="button" id="check-updates-btn" class="check-updates-btn" title="Check for updates">Check updates</button>
      <button type="button" id="manual-btn" class="check-updates-btn" title="Open manual">Manual</button>
    </header>
    <main class="app-main">
      <section class="upload-bar">
        <div id="drop-zone" class="upload-btn">
          <span>Upload Core.log</span>
          <input id="file-input" type="file" accept=".log,.txt,.gz" />
        </div>
        <div id="status-data-zone" class="upload-btn upload-btn-secondary">
          <span id="status-data-label">Upload Status Data</span>
          <input id="status-data-input" type="file" accept=".htm,.html" />
        </div>
        <div class="upload-feedback">
          <div id="progress" class="progress-bar"><div class="bar"></div></div>
          <div id="status-text" class="status-text"></div>
        </div>
      </section>
      <section class="dashboard" id="dashboard" hidden>
        <div id="view-toggle-wrap" class="view-toggle-wrap"></div>
        <div id="global-timeframe-wrap" class="global-timeframe-wrap" aria-label="Time window"></div>
        <div class="export-actions export-actions--under-timeframe" aria-label="Export">
          <button id="btn-download-json" type="button">JSON</button>
          <button id="btn-download-html" type="button">Report</button>
        </div>
        <nav class="tabs">
          <button data-tab="overview" class="active">Overview</button>
          <button data-tab="findings">Findings</button>
          <button data-tab="errors">Top Errors</button>
          <button data-tab="sensors">Sensors &amp; Probes</button>
          <button data-tab="timeline">Timeline</button>
          <button data-tab="system">System Info</button>
        </nav>
        <section class="tab-content active" id="tab-overview">
          <div id="overview-summary" class="panel"></div>
          <div id="overview-status-snapshot" class="panel"></div>
          <div id="overview-health" class="panel"></div>
          <div id="overview-metrics" class="panel"></div>
          <div id="overview-charts" class="chart"></div>
        </section>
        <section class="tab-content" id="tab-findings">
          <div id="findings-list" class="panel"></div>
        </section>
        <section class="tab-content" id="tab-errors">
          <div id="errors-wrap" class="panel">
            <div id="errors-toolbar" class="errors-toolbar"></div>
            <div id="errors-list" class="errors-list"></div>
          </div>
        </section>
        <section class="tab-content" id="tab-sensors">
          <div class="chart-with-export">
            <div class="chart-export-row"><label><input type="checkbox" class="chart-export-checkbox" data-export-chart-id="intervals" /> Include in report</label></div>
            <div id="chart-intervals" class="chart"></div>
          </div>
          <div class="chart-with-export">
            <div class="chart-export-row"><label><input type="checkbox" class="chart-export-checkbox" data-export-chart-id="sensor-types" /> Include in report</label></div>
            <div id="chart-erp-sensor-types" class="chart"></div>
          </div>
          <div id="probe-impact-container"></div>
          <div id="sensors-table" class="panel"></div>
        </section>
        <section class="tab-content" id="tab-timeline">
          <div id="timeline-list" class="panel"></div>
          <div class="chart-with-export">
            <div class="chart-export-row"><label><input type="checkbox" class="chart-export-checkbox" data-export-chart-id="timeline" /> Include in report</label></div>
            <div id="chart-timeline" class="chart"></div>
          </div>
        </section>
        <section class="tab-content" id="tab-system">
          <div id="system-info" class="panel"></div>
        </section>
      </section>
    </main>
  </div>
  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
